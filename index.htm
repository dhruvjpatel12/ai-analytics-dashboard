<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI MIS Analytics</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<div class="logo">
    📊
</div>
<h1>
AI MIS Analytics
</h1>
<p class="subtitle">
Upload your Excel dataset and generate an AI-powered management report
</p>
<div class="upload-box">
<label class="upload-label">
Select Excel Dataset
</label>
<input
type="file"
id="excelFile"
accept=".xlsx,.xls"
>
</div>
<button id="generateBtn">
Generate Report
</button>
<div id="status">
Ready for dataset upload
</div>
<div class="footer">
Supports Excel files (.xlsx, .xls)
</div>
</div>
<script src="script.js"></script>
</body>
</html>
